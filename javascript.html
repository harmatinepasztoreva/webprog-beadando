<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JavaScript CRUD</title>
<link rel="stylesheet" href="javascript.css">
</head>
<body>
<h1><center>JavaScript CRUD</center></h1>
<hr>
<div class="employee-form">

<form onsubmit="event.preventDefault();onFormSubmit();">
<div>


<label>Id*</label><label class="validation-error hide" id="IdValidationError">This field is required.</label>
<input type="text" name="Id" id="Id">
</div>
<div>
<label>Sütemény neve</label>
<input type="text" name="sutinev" id="sutinev">
</div>
<div>
<label>Sütemény típusa</label>
<input type="text" name="salary" id="salary">
</div>
<div>
<label>Díjazott</label>
<input type="text" name="city" id="city">
</div>
<div class="form-action-buttons">
<input type="submit" value="Submit">
</div>
</form>
</div>
<br/>
// Elkészíti a tábla szerkezetét:
<div class = "employees-table">
<table class="list" id="employeeList">
<thead>
<tr>
<th>Id</th>
<th>Sütemény neve</th>
<th>Salary</th>
<th>City</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
</tbody>
</table>
</div>
<script src="javascript.js" charset="UTF-8"></script>
</body>
</html>
